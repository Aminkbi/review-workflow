services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: review_workflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d review_workflow"]
      interval: 5s
      timeout: 5s
      retries: 20
